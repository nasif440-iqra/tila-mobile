<svg width="300" height="500" viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes glowPulse { 0%,100%{opacity:.08} 50%{opacity:.25} }
    @keyframes moonBreathe { 0%,100%{filter:brightness(1);transform:translateY(0)} 50%{filter:brightness(1.12);transform:translateY(-2px)} }
    @keyframes sparkle { 0%,100%{opacity:.2;transform:scale(.7)} 40%{opacity:1;transform:scale(1.4)} 60%{opacity:.9;transform:scale(1.2)} }
    @keyframes archGlow { 0%,100%{opacity:.6} 50%{opacity:1} }
    @keyframes keystonePulse { 0%,100%{r:4;opacity:.8} 50%{r:5;opacity:1} }
    .glow-outer { animation: glowPulse 4s ease-in-out infinite; }
    .glow-inner { animation: glowPulse 4s ease-in-out infinite 0.6s; }
    .crescent-body { animation: moonBreathe 5s ease-in-out infinite; }
    .star-1 { animation: sparkle 3s ease-in-out infinite; }
    .star-2 { animation: sparkle 3s ease-in-out infinite 0.7s; }
    .star-3 { animation: sparkle 3s ease-in-out infinite 1.4s; }
    .star-4 { animation: sparkle 3s ease-in-out infinite 2.1s; }
    .star-5 { animation: sparkle 3s ease-in-out infinite 1.0s; }
    .arch-outer { animation: archGlow 4s ease-in-out infinite 0.3s; }
    .arch-inner { animation: archGlow 4s ease-in-out infinite 0.8s; }
    .keystone { animation: keystonePulse 3s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
  </style>
  <rect x="0" y="0" width="300" height="500" rx="32" fill="#163323"/>
  <rect x="8" y="8" width="284" height="484" rx="28" fill="none" stroke="#C4A464" stroke-width="0.5" opacity="0.15"/>
  <circle class="glow-outer" cx="150" cy="175" r="80" fill="#C4A464" opacity="0.1"/>
  <circle class="glow-inner" cx="150" cy="175" r="55" fill="#C4A464" opacity="0.12"/>
  <g class="crescent-body" style="transform-origin:150px 175px">
    <circle cx="150" cy="175" r="46" fill="#C4A464"/>
    <circle cx="166" cy="163" r="37" fill="#163323"/>
  </g>
  <g class="star-1" style="transform-origin:105px 112px"><circle cx="105" cy="112" r="2.5" fill="#C4A464"/></g>
  <g class="star-2" style="transform-origin:200px 125px"><circle cx="200" cy="125" r="2" fill="#C4A464"/></g>
  <g class="star-3" style="transform-origin:185px 98px"><circle cx="185" cy="98" r="1.8" fill="#C4A464"/></g>
  <g class="star-4" style="transform-origin:98px 148px"><circle cx="98" cy="148" r="1.5" fill="#C4A464"/></g>
  <g class="star-5" style="transform-origin:122px 92px"><circle cx="122" cy="92" r="2" fill="#C4A464"/></g>
  <path class="arch-outer" d="M88 320 L88 195 Q88 78 150 68 Q212 78 212 195 L212 320" fill="none" stroke="#C4A464" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path class="arch-inner" d="M104 320 L104 200 Q104 98 150 88 Q196 98 196 200 L196 320" fill="none" stroke="#C4A464" stroke-width="1" opacity="0.3"/>
  <circle class="keystone" cx="150" cy="66" r="4" fill="#C4A464" opacity="0.9"/>
  <line x1="78" y1="320" x2="222" y2="320" stroke="#C4A464" stroke-width="0.6" opacity="0.2"/>
  <circle cx="88" cy="320" r="2" fill="#C4A464" opacity="0.35"/>
  <circle cx="212" cy="320" r="2" fill="#C4A464" opacity="0.35"/>
  <text x="150" y="385" text-anchor="middle" font-family="'Lora', Georgia, serif" font-size="54" font-weight="400" letter-spacing="16" fill="#C4A464">tila</text>
  <text x="150" y="425" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" letter-spacing="5" fill="#F8F6F0" opacity="0.6">READ BEAUTIFULLY</text>
  <line x1="110" y1="452" x2="150" y2="460" stroke="#C4A464" stroke-width="0.5" opacity="0.2"/>
  <line x1="190" y1="452" x2="150" y2="460" stroke="#C4A464" stroke-width="0.5" opacity="0.2"/>
  <circle cx="150" cy="460" r="1.5" fill="#C4A464" opacity="0.2"/>
</svg>
