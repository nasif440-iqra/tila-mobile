<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes hgp{0%,100%{opacity:.08}50%{opacity:.25}}
    @keyframes hmb{0%,100%{filter:brightness(1);transform:translateY(0)}50%{filter:brightness(1.12);transform:translateY(-1px)}}
    @keyframes hsp{0%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1.4)}60%{opacity:.9;transform:scale(1.2)}}
    @keyframes hag{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes hkp{0%,100%{r:2.5;opacity:.8}50%{r:3.2;opacity:1}}
    .hglow-o{animation:hgp 4s ease-in-out infinite}
    .hglow-i{animation:hgp 4s ease-in-out infinite .6s}
    .hcm{animation:hmb 5s ease-in-out infinite}
    .hs1{animation:hsp 3s ease-in-out infinite}
    .hs2{animation:hsp 3s ease-in-out infinite .7s}
    .hs3{animation:hsp 3s ease-in-out infinite 1.4s}
    .hao{animation:hag 4s ease-in-out infinite .3s}
    .hai{animation:hag 4s ease-in-out infinite .8s}
    .hks{animation:hkp 3s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
  </style>
  <rect x="0" y="0" width="680" height="180" rx="24" fill="#163323"/>
  <circle class="hglow-o" cx="105" cy="90" r="55" fill="#C4A464" opacity="0.1"/>
  <circle class="hglow-i" cx="105" cy="90" r="38" fill="#C4A464" opacity="0.12"/>
  <g class="hcm" style="transform-origin:105px 90px">
    <circle cx="105" cy="90" r="30" fill="#C4A464"/>
    <circle cx="115" cy="82" r="24" fill="#163323"/>
  </g>
  <g class="hs1" style="transform-origin:74px 56px"><circle cx="74" cy="56" r="1.8" fill="#C4A464"/></g>
  <g class="hs2" style="transform-origin:140px 62px"><circle cx="140" cy="62" r="1.5" fill="#C4A464"/></g>
  <g class="hs3" style="transform-origin:128px 48px"><circle cx="128" cy="48" r="1.3" fill="#C4A464"/></g>
  <path class="hao" d="M68 155 L68 100 Q68 38 105 30 Q142 38 142 100 L142 155" fill="none" stroke="#C4A464" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <path class="hai" d="M78 155 L78 104 Q78 50 105 42 Q132 50 132 104 L132 155" fill="none" stroke="#C4A464" stroke-width="0.7" opacity="0.3"/>
  <circle class="hks" cx="105" cy="28" r="2.5" fill="#C4A464" opacity="0.9"/>
  <line x1="185" y1="45" x2="185" y2="135" stroke="#C4A464" stroke-width="0.5" opacity="0.15"/>
  <text x="220" y="100" font-family="'Lora', Georgia, serif" font-size="56" font-weight="400" letter-spacing="16" fill="#C4A464">tila</text>
  <text x="222" y="130" font-family="'Inter', sans-serif" font-size="13" letter-spacing="5" fill="#F8F6F0" opacity="0.5">READ BEAUTIFULLY</text>
</svg>
